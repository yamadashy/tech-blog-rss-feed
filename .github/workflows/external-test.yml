name: External Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # NOTE: UTCなので9時間引く
    # 毎週土曜日の午前9時に実行
    - cron: 0 0 * * 6
  workflow_dispatch:

jobs:
  test-external:
    name: Run External Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: npm
      - run: npm ci
      - uses: ./.github/actions/restore-feed-cache

      - name: Run external tests
        id: external-test
        continue-on-error: true
        run: npm run test-external -- --reporter=verbose --reporter=json --outputFile=test-results.json

      - name: Comment test results on PR
        if: github.event_name == 'pull_request' && !cancelled()
        uses: actions/github-script@v7
        env:
          TEST_OUTCOME: ${{ steps.external-test.outcome }}
        with:
          script: |
            const fs = require('fs');

            let results;
            try {
              results = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
            } catch (e) {
              console.log('No test results found');
              return;
            }

            const passed = results.numPassedTests || 0;
            const failed = results.numFailedTests || 0;
            const total = results.numTotalTests || 0;
            const icon = failed === 0 ? '✅' : '⚠️';

            let body = `## ${icon} 外部テスト結果\n\n`;
            body += `| ステータス | 件数 |\n`;
            body += `|-----------|------|\n`;
            body += `| ✅ 成功 | ${passed} |\n`;
            body += `| ❌ 失敗 | ${failed} |\n`;
            body += `| 📊 合計 | ${total} |\n\n`;

            if (failed > 0 && results.testResults) {
              body += `<details>\n<summary>失敗したテスト (${failed}件)</summary>\n\n`;
              for (const suite of results.testResults) {
                for (const test of suite.assertionResults || []) {
                  if (test.status === 'failed') {
                    body += `- **${test.ancestorTitles?.join(' > ')}** > ${test.title}\n`;
                    if (test.failureMessages?.length > 0) {
                      const msg = test.failureMessages[0].split('\n').slice(0, 3).join('\n');
                      body += `  \`\`\`\n  ${msg}\n  \`\`\`\n`;
                    }
                  }
                }
              }
              body += `\n</details>\n\n`;
            }

            body += `> ℹ️ 外部テストはRSSフィードの取得可否を検証しています。失敗はフィード提供元の問題であり、コードの問題ではありません。\n`;

            // 既存のコメントを探して更新、なければ新規作成
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body?.includes('外部テスト結果\n\n| ステータス')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - uses: ./.github/actions/save-feed-cache
